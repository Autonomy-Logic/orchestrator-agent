name: Format Check

on:
  pull_request:
    branches: [development, main]

jobs:
  black:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install black
        run: pip install black

      - name: Check formatting
        run: black --check --diff src/ tests/
        continue-on-error: true
